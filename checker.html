<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Intrams | Team Checker</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .nav-custom { width: 100%; padding: 20px; text-align: center; border-bottom: 1px solid #333; margin-bottom: 50px; }
        .nav-custom a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 0.8rem; }
        .nav-custom a:hover, .nav-custom a.active { color: #fff; text-shadow: 0 0 10px #fff; }
        .main-card { background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 600px; backdrop-filter: blur(15px); }
        .form-select { background-color: #111; color: white; border: 1px solid #444; }
        .btn-verify { background-color: #fff; color: #000; font-weight: 900; width: 100%; padding: 15px; border-radius: 5px; border: none; }
        #image img { border-radius: 15px; max-width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <nav class="nav-custom">
        <a href="index.html">Sign Up</a>
        <a href="checker.html" class="active">Team Checker</a>
        <a href="rosters.html">Rosters</a>
    </nav>

    <div class="main-card">
        <h2 class="text-center">INTRAMS CHECKER</h2>
        <div class="mb-4 text-center mt-4">
            <label class="d-block small text-secondary">REGISTRATION DONE?</label>
            <input type="radio" name="registration" value="registered"> YES 
            <input type="radio" name="registration" value="notRegistered"> NO
        </div>
        <div class="mb-4 text-center">
            <label class="d-block small text-secondary">MEDICAL CLEARANCE?</label>
            <input type="radio" name="clearance" value="cleared"> YES 
            <input type="radio" name="clearance" value="notCleared"> NO
        </div>
        <div class="row mb-4">
            <div class="col-6"><select id="level" class="form-select"><option value="7">Grade 7</option><option value="8">Grade 8</option><option value="9">Grade 9</option><option value="10">Grade 10</option></select></div>
            <div class="col-6"><select id="section" class="form-select"><option value='ruby'>Ruby</option><option value='emerald'>Emerald</option></select></div>
        </div>
        <button py-click="intrams_checker" class="btn-verify">FIND MY TEAM</button>
        <div id="output" class="text-center mt-4"></div>
        <div id="image" class="text-center"></div>
    </div>
    <py-script src="main_checker.py"></py-script>
</body>
</html>
