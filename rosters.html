<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>JHS Intrams | Player List</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .nav-custom { width: 100%; padding: 20px; text-align: center; border-bottom: 1px solid #333; margin-bottom: 50px; }
        .nav-custom a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 0.8rem; }
        .nav-custom a:hover, .nav-custom a.active { color: #fff; text-shadow: 0 0 10px #fff; }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 90%; }
        .team-card { background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; }
        .player-list { list-style: none; padding: 0; font-family: 'Arial', sans-serif; font-size: 0.85rem; color: #ccc; }
        .tigers { color: #ffcc00; } .bears { color: #0066ff; } .hornets { color: #00ff00; } .bulldogs { color: #ff0000; }
    </style>
</head>
<body py-ready="load_rosters">
    <nav class="nav-custom">
        <a href="index.html">Sign Up</a>
        <a href="checker.html">Team Checker</a>
        <a href="team_rosters.html" class="active">Player List</a>
    </nav>
    <!-- TEAMS -->
    <div class="roster-grid">
        <div class="team-card tigers"><h3>TIGERS</h3><ul id="list-tigers" class="player-list"></ul></div>
        <div class="team-card bears"><h3>BEARS</h3><ul id="list-bears" class="player-list"></ul></div>
        <div class="team-card hornets"><h3>HORNETS</h3><ul id="list-hornets" class="player-list"></ul></div>
        <div class="team-card bulldogs"><h3>BULLDOGS</h3><ul id="list-bulldogs" class="player-list"></ul></div>
    </div>
    <py-script src="main_roster.py"></py-script>
</body>
</html>
